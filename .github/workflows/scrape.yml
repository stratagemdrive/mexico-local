name: Mexico News RSS Scraper

on:
  schedule:
    # 6 AM EST = 11:00 UTC  |  6 PM EST = 23:00 UTC
    - cron: "0 11 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch:  # Allow manual runs

permissions:
  contents: write

jobs:
  scrape-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Copy output to docs/ for GitHub Pages
        run: |
          mkdir -p docs
          cp mexico_news.json docs/mexico_news.json

      - name: Commit and push updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mexico_news.json docs/mexico_news.json
          git diff --cached --quiet || git commit -m "chore: update mexico_news.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git pull --rebase origin main
          git push origin main
